{% extends "student_layout.html" %}

{% block body %}

<div style="max-width:700px;margin:auto;">

    <div style="
        background:white;
        padding:30px;
        border-radius:12px;
        box-shadow:0 4px 15px rgba(0,0,0,0.1);
        text-align:center;
    ">

        <h2 style="margin-bottom:20px;">📊 Exam Result</h2>

        <!-- SCORE -->
        <div style="
    max-width:500px;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
">

            <h2>📊 Result</h2>

            <p>Total Marks: {{total}}</p>
            <p>Obtained: {{obtained}}</p>
            <p style="color:green;">Correct: {{correct}}</p>
            <p style="color:red;">Wrong: {{wrong}}</p>

        </div>

        <!-- PROGRESS BAR -->
        <div style="margin-top:25px;">

            {% set percent = (obtained / total * 100) if total > 0 else 0 %}

            <div style="
                width:100%;
                background:#e5e7eb;
                border-radius:10px;
                overflow:hidden;
            ">

                <div style="
                    width:{{percent}}%;
                    background:#2563eb;
                    padding:10px;
                    color:white;
                    font-weight:bold;
                ">
                    {{percent|round(0)}}%
                </div>

            </div>

        </div>

        <!-- BUTTON -->
        <div style="margin-top:30px;">
            <a href="/student-dashboard">
                <button style="
                    background:#2563eb;
                    color:white;
                    padding:10px 20px;
                    border:none;
                    border-radius:8px;
                    cursor:pointer;
                ">
                    Back to Dashboard
                </button>
            </a>
        </div>

    </div>

</div>

{% endblock %}
