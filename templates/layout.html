<!DOCTYPE html>
<html>

<head>
    <title>Examora</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* NAVBAR */

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f97316;
            padding: 10px 20px;
            border-bottom: 2px solid #ea580c;
            margin-bottom: 30px;
        }

        .nav-left {
            width: 33%;
        }

        .nav-center {
            width: 33%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .nav-right {
            width: 33%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 45px;
            height: 45px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
        }

        .logout-btn {
            background: #e92b2b;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;

        }

        .logout-btn:hover {
            background: #ca2020;
        }

        .back-btn {
            background: #e92b2b;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        .back-btn:hover {
            background: #b91c1c;
        }

        .student-box {
            background: #f97316;
            padding: 6px 12px;
            border-radius: 6px;
            text-align: left;
            color: white;
        }

        .student-name {
            font-weight: bold;
            font-size: 14px;
        }

        .student-id {
            font-size: 12px;
            opacity: 0.8;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
        }

        /* TABLE DESIGN */

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th {
            background: #ff7a00;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background: #fff3e6;
        }
    </style>
</head>

<body>

    <div class="navbar">

        <!-- LEFT : BACK BUTTON -->

        <div class="nav-left">
            <button onclick="history.back()" class="back-btn">← Back</button>
        </div>

        <!-- CENTER : LOGO + TITLE -->

        <div class="nav-center">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" class="logo">
            <span class="title">Examora</span>
        </div>

        <!-- RIGHT : USER INFO -->
        <div class="nav-right">

            {% if student %}
            <div class="student-box">
                <div class="student-name">👤 {{ student.name }}</div>
                <div class="student-id">ID: {{ student.student_id }}</div>
            </div>
            {% endif %}

            {% if "admin" in session %}
            <div class="student-box">
                <div class="student-name">👨‍🏫 Admin Panel</div>
            </div>
            {% endif %}

            {% if session.get("student_id") or session.get("admin") %}
            <a href="/logout" class="logout-btn">Logout</a>
            {% endif %}

        </div>

    </div>

    <div style="padding:30px;">
        {% block body %}
        {% endblock %}
    </div>

</body>

</html>
