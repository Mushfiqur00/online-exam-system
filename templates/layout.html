<!DOCTYPE html>
<html>

<head>
    <title>Examora - Online Exam System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff8f0;
        }

        /* NAVBAR */

        .navbar {
            background: #ff7a00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .logo {
            height: 40px;
            margin-right: 10px;
        }

        .site-name {
            font-size: 22px;
            color: white;
            font-weight: bold;
        }

        .nav-right a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .nav-right a:hover {
            text-decoration: underline;
        }

        /* PAGE CONTENT */

        .content {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
            min-height: 500px;
        }

        /* FOOTER */

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        footer p {
            margin: 5px;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="nav-left">

            <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

            <span class="site-name">Examora</span>

        </div>

        <div class="nav-right">

            <a href="/">Home</a>

            <a href="/student-dashboard">Dashboard</a>

            <a href="/admin-dashboard">Admin</a>

            <a href="/logout">Logout</a>

        </div>

    </nav>


    <!-- MAIN CONTENT -->

    <div class="content">

        {% block content %}

        {% endblock %}

    </div>


    <!-- FOOTER -->

    <footer>

        <p>Examora – Smart. Secure. Simplified Exams.</p>

        <p>Capstone Project | Daffodil International University</p>

        <p>© 2026 Group‑4</p>

    </footer>

</body>

</html>
