<!DOCTYPE html>
<html>

<head>

    <title>Create Exam</title>

    <style>
        body {
            font-family: Arial;
            background: #fff7ed;
            padding: 40px;
        }

        h2 {
            color: #ea580c;
        }

        button {
            padding: 10px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f97316;
            color: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f97316;
            padding: 10px 20px;
            border-bottom: 2px solid #ea580c;
            margin-bottom: 30px;
        }

        .nav-left {
            width: 33%;
        }

        .nav-center {
            width: 33%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .nav-right {
            width: 33%;
            text-align: right;
        }

        .logo {
            width: 45px;
            height: 45px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
        }

        .logout-btn {
            background: #dc2626;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;

        }

        .logout-btn:hover {
            background: #b91c1c;
        }

        .back-btn {
            background: #dc2626;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        .back-btn:hover {
            background: #b91c1c;
        }
    </style>

</head>

<body>
    <div class="navbar">

        <div class="nav-left">
            <button class="back-btn" onclick="history.back()">Back</button>
        </div>

        <div class="nav-center">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" class="logo">
            <span class="title">Examora</span>
        </div>

        <div class="nav-right">
            <a href="/logout">
                <button class="logout-btn">Logout</button>
            </a>
        </div>

    </div>

    <h2>Create Exam</h2>

    <form action="/create-exam" method="POST">

        <input name="title" placeholder="Exam Title">

        <input type="date" name="exam_date">

        <input type="time" name="start_time">

        <input type="time" name="end_time">

        <input type="number" name="duration" placeholder="Duration">

        <button>Create Exam</button>

    </form>

    <h3>Created Exams</h3>

    <table>

        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
            <th>Action</th>
        </tr>

        {% for exam in exams %}

        <tr>

            <td>{{ exam.title }}</td>
            <td>{{ exam.exam_date }}</td>
            <td>{{ exam.start_time }}</td>
            <td>{{ exam.end_time }}</td>

            <td>
                <a href="/delete-exam/{{exam.id}}">
                    <button>Delete</button>
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
