<!DOCTYPE html>
<html>

<head>

    <title>Create Exam</title>

    <style>
        body {
            font-family: Arial;
            background: #fff7ed;
            padding: 40px;
        }

        h2 {
            color: #ea580c;
        }

        button {
            padding: 10px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f97316;
            color: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 5px;
        }
    </style>

</head>

<body>

    <h2>Create Exam</h2>

    <form action="/create-exam" method="POST">

        <input name="title" placeholder="Exam Title">

        <input type="date" name="exam_date">

        <input type="time" name="start_time">

        <input type="time" name="end_time">

        <input type="number" name="duration" placeholder="Duration">

        <button>Create Exam</button>

    </form>

    <h3>Created Exams</h3>

    <table>

        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
        </tr>

        {% for exam in exams %}

        <tr>

            <td>{{ exam.title }}</td>
            <td>{{ exam.exam_date }}</td>
            <td>{{ exam.start_time }}</td>
            <td>{{ exam.end_time }}</td>

        </tr>

        {% endfor %}

    </table>

</body>

</html>
