{% extends "student_layout.html" %}
{% block body %}

<style>
    body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        font-family: 'Segoe UI', sans-serif;
    }

    /* container */
    .exam-container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    /* title */
    .exam-title {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* timer */
    .timer-box {
        position: sticky;
        top: 10px;
        background: #dc2626;
        color: white;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* question card */
    .question-card {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: 0.2s;
    }

    .question-card:hover {
        transform: translateY(-2px);
    }

    /* options */
    .option {
        display: block;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
    }

    .option:hover {
        background: #f1f5f9;
    }

    /* input */
    .short-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    /* button */
    .submit-btn {
        background: #2563eb;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #1d4ed8;
    }
</style>

<div class="exam-container">

    <h2 class="exam-title">📝 Exam</h2>

    <div class="timer-box" id="timer">Loading...</div>

    <form id="examForm" method="POST" action="/submit-exam/{{exam_id}}">

        {% for q in questions %}

        <div class="question-card">

            <p><b>{{loop.index}}. {{q.question_text}}</b></p>

            {% if q.question_type == "mcq" %}

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option1}}" required>
                {{q.option1}}
            </label>

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option2}}">
                {{q.option2}}
            </label>

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option3}}">
                {{q.option3}}
            </label>

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option4}}">
                {{q.option4}}
            </label>

            {% else %}

            <input type="text" name="q{{q.id}}" class="short-input" placeholder="Write your answer..." required>

            {% endif %}

        </div>

        {% endfor %}

        <div style="text-align:center;">
            <button class="submit-btn">Submit Exam</button>
        </div>

    </form>

</div>

<script>
    var time = {{ duration }} * 60;

    var timer = setInterval(function () {
        var minutes = Math.floor(time / 60);
        var seconds = time % 60;

        if (seconds < 10) seconds = "0" + seconds;

        document.getElementById("timer").innerHTML =
            "⏱ Time Left: " + minutes + ":" + seconds;

        time--;

        if (time < 0) {
            clearInterval(timer);
            alert("Time is up!");
            document.getElementById("examForm").submit();
        }

    }, 1000);
</script>

{% endblock %}
