{% extends "student_layout.html" %}
{% block body %}

<style>
    body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        font-family: 'Segoe UI', sans-serif;
    }

    /* container */
    .exam-container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
    }

    /* title */
    .exam-title {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    /* timer */
    .timer-box {
        position: sticky;
        top: 10px;
        background: #dc2626;
        color: white;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        font-weight: bold;
        margin-bottom: 20px;
        transition: none !important;
        /* ব্লিঙ্কিং যাতে স্মুথ হয় */
    }

    /* question card */
    .question-card {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: 0.2s;
    }

    .question-card:hover {
        transform: translateY(-2px);
    }

    /* options */
    .option {
        display: block;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
    }

    .option:hover {
        background: #f1f5f9;
    }

    /* input */
    .short-input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    /* button */
    .submit-btn {
        background: #2563eb;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #1d4ed8;
    }

    .timer-blink {
        background: white !important;
        color: #dc2626 !important;
        border: 2px solid #dc2626 !important;
        box-shadow: 0 0 15px rgba(220, 38, 38, 0.8) !important;
    }
</style>

<div class="exam-container">
    <h2 class="exam-title">📝 Exam</h2>

    <div class="timer-box" id="timer">Loading...</div>

    <form id="examForm" method="POST" action="/submit-exam/{{ exam.id }}">

        {% for q in questions %}
        <div class="question-card">
            <p><b>{{loop.index}}. {{q.question_text}}</b></p>

            {% if q.question_type == "mcq" %}
            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option_a}}" required>
                {{q.option_a}}
            </label>

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option_b}}">
                {{q.option_b}}
            </label>

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option_c}}">
                {{q.option_c}}
            </label>

            <label class="option">
                <input type="radio" name="q{{q.id}}" value="{{q.option_d}}">
                {{q.option_d}}
            </label>

            {% else %}
            <input type="text" name="q{{q.id}}" class="short-input" placeholder="Write your answer..." required>
            {% endif %}
        </div>
        {% endfor %}

        <div style="text-align:center;">
            <button type="submit" class="submit-btn">Submit Exam</button>
        </div>
    </form>

</div>

<script>
    let totalSeconds = parseInt("{{ exam.duration }}") * 60;
    let timerDiv = document.getElementById("timer");

    function updateTimer() {
        if (totalSeconds <= 0) {
            timerDiv.innerHTML = "Time's Up!";
            timerDiv.classList.remove("timer-blink");
            timerDiv.style.background = "black";
            document.getElementById("examForm").submit(); // Auto submit
            return;
        }

        let minutes = Math.floor(totalSeconds / 60);
        let seconds = totalSeconds % 60;

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        timerDiv.innerHTML = minutes + " : " + seconds;

        if (totalSeconds <= 60 && totalSeconds > 0) {
            if (totalSeconds % 2 !== 0) {
                timerDiv.classList.add("timer-blink");
            } else {
                timerDiv.classList.remove("timer-blink");
            }
        }

        totalSeconds--;
    }

    setInterval(updateTimer, 1000);
    updateTimer(); 
</script>
{% endblock %}
