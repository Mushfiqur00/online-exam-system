<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>
        body {
            background: #fff7ed;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #ea580c;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Login</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <a href="/student-register">Student Registration</a>
    </div>


</body>

</html>
