<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Examora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Shared variables from dashboard theme */
        :root {
            --bg-color: #fffaf0;
            --text-main: #2d1b0a;
            --card-bg: #ffffff;
            --primary-orange: #ea580c;
            --primary-hover: #c2410c;
            --sidebar-brown: #6b2e0b;
            --border-color: #fce7d2;
            --input-bg: rgba(0, 0, 0, 0.03);
            --tab-active-student: #4f46e5;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --card-bg: #1e293b;
            --primary-orange: #f97316;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-color: #333333;
            --tab-active-student: #4f46e5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.8s ease;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        /* Fixed the Syntax Error Here */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 30px;
            padding: 5px;
        }

        [data-theme="dark"] .tabs {
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-main);
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--tab-active-student);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.8;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            outline: none;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s ease;
        }

        .form-control:focus {
            border-color: #ea580c;
            background-color: var(--card-bg);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #ea580c;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: #c2410c;
        }

        .bottom-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .bottom-link a {
            color: #ea580c;
            text-decoration: none;
            font-weight: 600;
        }

        [data-theme="dark"] .bottom-link a {
            color: #818cf8;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>

    <div class="login-container">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Examora">
            <h2 style="color: var(--sidebar-brown); font-weight: 700; margin: 10px 0;">Welcome Back</h2>
            <p style="opacity: 0.7; font-size: 0.9rem; color: var(--text-main); margin: 0;">Sign in to continue</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-msg">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <div class="tabs">
            <button type="button" class="tab-btn active" id="student-tab"
                onclick="switchTab('student')">Student</button>
            <button type="button" class="tab-btn" id="admin-tab" onclick="switchTab('admin')">Admin</button>
        </div>

        <form action="/login" method="POST" id="loginForm">
            <input type="hidden" name="role" id="login-role" value="student">

            <div class="form-group">
                <label id="user-label">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Sign In as Student</button>
        </form>

        <div class="bottom-link" id="signup-div">
            Don't have an account? <a href="/student-register">Sign Up Now</a>
        </div>

        <div class="bottom-link" style="margin-top: 10px;">
            <a href="/" style="color: var(--text-main); font-weight: normal; opacity: 0.8;">← Back to Home</a>
        </div>
    </div>

    <script>
        function switchTab(role) {
            const studentTab = document.getElementById('student-tab');
            const adminTab = document.getElementById('admin-tab');
            const submitBtn = document.getElementById('submitBtn');
            const signupDiv = document.getElementById('signup-div');
            const roleInput = document.getElementById('login-role');
            const userLabel = document.getElementById('user-label');
            const userInput = document.querySelector('input[name="username"]');

            roleInput.value = role;

            if (role === 'admin') {
                adminTab.classList.add('active');
                studentTab.classList.remove('active');
                submitBtn.innerText = "Sign In as Admin";
                signupDiv.style.display = 'none';
                userLabel.innerText = "Admin Username"; // এখানে Email এর বদলে Username দিন
                userInput.placeholder = "Enter admin username";
            } else {
                studentTab.classList.add('active');
                adminTab.classList.remove('active');
                submitBtn.innerText = "Sign In as Student";
                signupDiv.style.display = 'block';
                userLabel.innerText = "Username";
                userInput.placeholder = "Enter your username";
            }
        }
    </script>
</body>

</html>
