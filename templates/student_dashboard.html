{% extends "layout.html" %}

{% block body %}

<h2 style="text-align:center;">Available Exams</h2>

<table border="1" cellpadding="10" cellspacing="0"
    style="margin:auto; width:80%; text-align:center; border-collapse: collapse;">
    <tr style="background-color:#f2f2f2;">
        <th>Title</th>
        <th>Date</th>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Duration (Minutes)</th>
        <th>Action</th>
    </tr>

    {% for exam in exams %}
    <tr>
        <td>{{ exam.title }}</td>
        <td>{{ exam.exam_date }}</td>
        <td>{{ exam.start_time }}</td>
        <td>{{ exam.end_time }}</td>
        <td>{{ exam.duration }}</td>
        <td>
            <a href="/start-exam/{{ exam.id }}">
                <button>Start Exam</button>
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
