{% extends "admin_layout.html" %}

{% block body %}

<h2>Add Question</h2>

<form method="POST">

Question <br>
<input type="text" name="question_text"><br><br>

Type<br>
<select name="question_type">
<option value="mcq">MCQ</option>
<option value="short">Short Answer</option>
</select><br><br>

Option1 <input type="text" name="option1"><br>
Option2 <input type="text" name="option2"><br>
Option3 <input type="text" name="option3"><br>
Option4 <input type="text" name="option4"><br><br>

Correct Answer<br>
<input type="text" name="correct_answer"><br><br>

Marks<br>
<input type="number" name="marks"><br><br>

<button type="submit">Save Question</button>

</form>

{% endblock %}
